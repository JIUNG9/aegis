# OpenTelemetry Collector config for SigNoz demo.
# Receives OTLP from otel-demo, writes to signoz-clickhouse.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    send_batch_size: 1000
    timeout: 10s
  memory_limiter:
    check_interval: 5s
    limit_mib: 256

exporters:
  clickhousetraces:
    datasource: tcp://signoz-clickhouse:9000/?database=signoz_traces
  clickhouselogsexporter:
    dsn: tcp://signoz-clickhouse:9000/?database=signoz_logs
  clickhousemetricswrite:
    endpoint: tcp://signoz-clickhouse:9000/?database=signoz_metrics

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhousetraces]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhouselogsexporter]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [clickhousemetricswrite]
