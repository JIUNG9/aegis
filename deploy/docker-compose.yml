version: "3.9"

services:
  # ─── Databases ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    environment:
      POSTGRES_DB: aegis
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis-dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aegis-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: aegis-clickhouse
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native protocol
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: aegis_logs
      CLICKHOUSE_USER: aegis
      CLICKHOUSE_PASSWORD: aegis-dev
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Application Services ──────────────────────────────────
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: aegis-api
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://aegis:aegis-dev@postgres:5432/aegis?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      CLICKHOUSE_URL: "http://clickhouse:8123"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  ai-engine:
    build:
      context: ../apps/ai-engine
      dockerfile: Dockerfile
    container_name: aegis-ai-engine
    ports:
      - "8000:8000"
    environment:
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      MODEL_NAME: "claude-sonnet-4-6"
      API_PORT: "8000"
      DEBUG: "true"
    depends_on:
      - redis

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    container_name: aegis-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
