name: Feature Request
description: Suggest a new feature for Aegis
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe the problem and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? What's the use case?
      placeholder: As an SRE, I want to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work?
    validations:
      required: true

  - type: dropdown
    id: module
    attributes:
      label: Module
      description: Which module would this belong to?
      options:
        - Log Explorer
        - SLO/SLI Dashboard
        - FinOps
        - Incident Management
        - Security Dashboard
        - Deployment Tracker
        - On-Call & Runbooks
        - Service Catalog
        - New Module
        - Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative approaches you've considered?
